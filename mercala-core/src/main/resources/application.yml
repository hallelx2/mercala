spring:
  application:
    name: mercala-core

server:
  port: 8080

# Actuator: expose only health on the web port (no metadata leakage without auth).
# Liveness/readiness probes enabled for Kubernetes later.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
